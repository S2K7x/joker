<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Buzz Rush — Flap your wings, dodge the honeycombs, top the leaderboard!" />
  <title>Buzz Rush — The Bee Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ SCREEN 1 — USERNAME ══ -->
  <div id="screen-username" class="screen active">
    <div class="stars-bg"></div>
    <div class="username-container">
      <div class="game-logo">
        <div class="chicken-emoji">🐝</div>
        <h1 class="game-title">BUZZ<br/>RUSH</h1>
      </div>
      <p class="subtitle">Flap your wings. Dodge the hives. Never stop.</p>
      <div class="input-group">
        <label for="username-input" class="input-label">Your Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👾</span>
          <input type="text" id="username-input" placeholder="e.g. BuzzMaster99"
            maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false" />
        </div>
        <button id="btn-play" class="btn-primary">
          <span class="btn-text">PLAY NOW</span>
          <span class="btn-arrow">→</span>
        </button>
        <div id="username-error" class="username-error hidden"></div>
        <p class="input-hint">* Your name will appear on the global leaderboard</p>
      </div>
      <div class="floating-decoration">
        <span class="deco-car car1">🌸</span>
        <span class="deco-car car2">🌼</span>
        <span class="deco-car car3">🌺</span>
      </div>
    </div>
  </div>

  <!-- ══ SCREEN 2 — GAME ══ -->
  <div id="screen-game" class="screen hidden">
    <canvas class="game"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="score">0</div>
      <div id="tries-hud"></div>
    </div>

    <!-- Flap button (mobile) -->
    <div id="controls">
      <button id="flap-btn" class="flap-button" aria-label="Flap">
        <span class="flap-icon">🐝</span>
        <span class="flap-text">FLAP</span>
      </button>
    </div>

    <!-- ══ GAME OVER OVERLAY ══ -->
    <div id="result-container">
      <div id="result">
        <div class="result-header">
          <div class="result-emoji">🐝💥</div>
          <h2 class="result-title">BUZZ OVER</h2>
        </div>
        <div class="score-display">
          <span class="score-label">HONEYCOMBS PASSED</span>
          <span id="final-score" class="score-value">0</span>
        </div>
        <!-- Leaderboard — always shown -->
        <div id="leaderboard-section">
          <div class="leaderboard-header"><h3>🏆 TOP 10 — GLOBAL</h3></div>
          <div id="leaderboard-loading" class="leaderboard-loading">
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
          </div>
          <ol id="leaderboard-list"></ol>
        </div>
        <!-- Location prompt -->
        <div id="location-section">
          <p class="location-text">🌍 Add your score to the leaderboard?</p>
          <p class="location-subtext">We need your location to show your country's flag.</p>
          <div class="location-buttons">
            <button id="btn-allow-location" class="btn-location-allow">📍 Add My Score</button>
            <button id="btn-skip-location" class="btn-location-skip">Skip</button>
          </div>
        </div>
        <!-- Retry -->
        <div class="retry-row">
          <button id="retry" class="btn-retry">↻ PLAY AGAIN</button>
          <p id="tries-info" class="tries-info"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="script2.js"></script>
</body>
</html>
